name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify build secrets
        run: |
          missing=0
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is not set — CMS/auth will not work on the live site."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Add missing secrets under GitHub → Settings → Secrets → Actions."
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build production site
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADMIN_ID: ${{ secrets.VITE_ADMIN_ID }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}

      - name: Deploy dist/ to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.DS_Store
            **/.git*
            **/Dashboard _ Hostinger.html
            **/Dashboard _ Hostinger_files/**
